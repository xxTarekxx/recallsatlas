<IfModule mod_ssl.c>
    <VirtualHost _default_:443>
        ServerAdmin webmaster@localhost

        SSLEngine on
        SSLCertificateFile    /etc/ssl/certs/ssl-cert-snakeoil.pem
        SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

        RewriteEngine On
        RewriteRule ^(.*)$ https://www.dollarsandlife.com%{REQUEST_URI} [L,R=permanent,NE]

        ErrorLog ${APACHE_LOG_DIR}/default_ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/default_ssl_access.log combined
    </VirtualHost>
</IfModule>