# Enable only after certs exist:
#   ls /etc/letsencrypt/live/recallsatlas.com/fullchain.pem
# sudo a2ensite recallsatlas-ssl.conf

<IfModule mod_ssl.c>

<VirtualHost *:443>
    ServerName www.recallsatlas.com
    ServerAlias recallsatlas.com

    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^recallsatlas\.com$ [NC]
    RewriteRule ^ https://www.recallsatlas.com%{REQUEST_URI} [L,R=301]

    DirectorySlash Off

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:3001/ nocanon
    ProxyPassReverse / http://127.0.0.1:3001/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}

    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/recallsatlas_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/recallsatlas_ssl_access.log combined

    SSLCertificateFile /etc/letsencrypt/live/recallsatlas.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/recallsatlas.com/privkey.pem
</VirtualHost>

</IfModule>

# After this site works on HTTPS, update recallsatlas.conf :80 to redirect only (no ProxyPass):
#   RewriteEngine On
#   RewriteRule ^ https://www.recallsatlas.com%{REQUEST_URI} [L,R=301]
#   (and remove ProxyPass / ProxyPassReverse / RequestHeader for proto)
