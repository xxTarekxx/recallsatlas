<VirtualHost *:80>
    # This ServerName is just a placeholder for requests that don't match any other ServerName.
    ServerName default-catchall 

    RewriteEngine On
    # Redirect any request coming to this default vhost to your main site's HTTPS WWW version
    RewriteRule ^(.*)$ https://www.dollarsandlife.com%{REQUEST_URI} [L,R=permanent,NE]

    ErrorLog ${APACHE_LOG_DIR}/default_error.log
    CustomLog ${APACHE_LOG_DIR}/default_access.log combined
</VirtualHost>