# HTTP only — use this until Let’s Encrypt files exist (no SSLCertificate* lines here).
# 1) sudo a2enmod proxy proxy_http headers rewrite ssl
# 2) sudo a2ensite recallsatlas.conf && sudo apache2ctl configtest && sudo systemctl reload apache2
# 3) sudo certbot --apache -d www.recallsatlas.com -d recallsatlas.com
# 4) sudo a2ensite recallsatlas-ssl.conf && sudo apache2ctl configtest && sudo systemctl reload apache2
# 5) Optional: switch :80 to redirect to https://www (see comment at bottom of recallsatlas-ssl.conf).

<VirtualHost *:80>
    ServerName www.recallsatlas.com
    ServerAlias recallsatlas.com

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^recallsatlas\.com$ [NC]
    RewriteRule ^ http://www.recallsatlas.com%{REQUEST_URI} [L,R=301]

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:3001/ nocanon
    ProxyPassReverse / http://127.0.0.1:3001/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}

    ErrorLog ${APACHE_LOG_DIR}/recallsatlas_error.log
    CustomLog ${APACHE_LOG_DIR}/recallsatlas_access.log combined
</VirtualHost>
