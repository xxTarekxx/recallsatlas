<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.dollarsandlife.com

    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}

    ErrorLog ${APACHE_LOG_DIR}/api_dollarsandlife_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/api_dollarsandlife_ssl_access.log combined
    SSLCertificateFile /etc/letsencrypt/live/dollarsandlife.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dollarsandlife.com/privkey.pem
</VirtualHost>
</IfModule>
